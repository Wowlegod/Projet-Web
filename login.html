{% include "header.html" %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0 p-4">
            <h2 class="text-center mb-4 text-primary fw-bold">Connexion</h2>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Se connecter</button>
            </form>
            <p class="text-center mt-3 small">Pas de compte ? <a href="/register">S'inscrire</a></p>
        </div>
    </div>
</div>
{% include "footer.html" %}
