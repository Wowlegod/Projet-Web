{% include "header.html" %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow p-4 border-0">
            <h2 class="text-center mb-4 text-success">Créer un compte</h2>
            <p class="text-center text-muted mb-4">Rejoignez-nous pour sauvegarder vos villes favorites.</p>

            <form action="/register" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" placeholder="Choisissez un nom" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimum 6 caractères" required>
                </div>
                <button type="submit" class="btn btn-success w-100 shadow-sm">S'inscrire</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="small text-muted">Déjà membre ? <a href="/login" class="text-decoration-none">Connectez-vous</a></p>
            </div>
        </div>
    </div>
</div>

{% include "footer.html" %}
